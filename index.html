<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
      color: #fff;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      overflow: hidden;
      white-space: nowrap;
      border-right: 3px solid #fff;
      width: 15ch;
      animation: typing 3s steps(15) infinite, blink 0.6s infinite;
    }

    @keyframes typing {
      from {
        width: 0;
      }
      to {
        width: 15ch;
      }
    }

    @keyframes blink {
      50% {
        border-color: transparent;
      }
    }

    p {
      font-size: 1.2rem;
      margin: 20px 0;
    }

    .button {
      padding: 10px 20px;
      font-size: 1rem;
      color: #fff;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
    }

    .button:hover {
      background: #fff;
      color: #333;
      transform: scale(1.1);
    }

    .footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.7);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Coming Soon...</h1>
    <p>Our website is under development. Stay tuned!</p>
<!--     <button class="button" onclick="subscribeAlert()">Notify Me</button> -->
  </div>
  <div class="footer">&copy; follow me on my Insta : @anmol.code</div>

  <script>
    function subscribeAlert() {
      alert("Thank you! We will notify you once we launch.");
    }
  </script>
</body>
</html>
